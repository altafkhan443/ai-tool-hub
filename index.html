<!DOCTYPE html>
<html>
<head>
<title>AI Tool Hub</title>

<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
text-align:center;
margin:0;
padding:0;
}

.hero{
padding:80px 20px;
}

h1{
font-size:50px;
color:#00e5ff;
}

p{
font-size:20px;
color:#ddd;
}

button{
background:#00e5ff;
color:black;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1a1a1a;
    padding:15px 30px;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#00e5ff;
}

.menu a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:18px;
}

.menu a:hover{
    color:#00e5ff;
}

.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin:50px 20px;
}

.card{
    background:#222;
    width:250px;
    padding:20px;
    border-radius:12px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 0 20px #00e5ff;
}

footer{
    background:#1a1a1a;
    padding:20px;
    margin-top:40px;
}  
</style>

</head>

<body>

<div class="hero">

<h1> AI Tool Hub</h1>

<p>Discover the Best Free AI Tools for Everyone</p>

<button>Explore AI Tools</button>

</div>

</body>
</html>
